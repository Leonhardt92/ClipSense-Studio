<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>句影检索台 (ClipSense Studio)</title>
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23111727'/%3E%3Ctext x='50%25' y='52%25' dominant-baseline='middle' text-anchor='middle' font-size='28' font-family='Arial,%20PingFang%20SC,%20Microsoft%20YaHei,%20sans-serif' fill='%23ffffff'%3E短%3C/text%3E%3C/svg%3E"
  />
  <link rel="stylesheet" href="./assets/css/index.css" />
</head>
<body>
  <main class="container">
    <nav class="top-nav">
      <a class="top-nav-link active" href="./index.html">句影检索台</a>
      <a class="top-nav-link" href="./embed-builder.html">向量生成</a>
      <a class="top-nav-link" href="./media-tools.html">媒体工具</a>
    </nav>

    <section class="main-content">
      <h1 class="title">句影检索台</h1>
      <p class="desc">输入一句话，返回表达相近的句子记录，并展示适配场景、情绪和可直接播放的 YouTube 视频片段。</p>

      <section class="search-bar">
        <input id="query" type="search" placeholder="例如：我现在压力很大但不想放弃" />
        <button id="searchBtn">搜索</button>
      </section>

      <section class="search-mode">
        <button id="mode-keyword" class="mode-btn active" type="button">关键词搜索</button>
        <button id="mode-semantic" class="mode-btn" type="button">语义搜索</button>
      </section>

      <div class="meta-row">
        <div id="status">正在加载 CSV 数据...</div>
        <div id="count">当前结果 0 条</div>
      </div>

      <section class="examples" id="examples"></section>
      <section class="column-picker" id="column-picker"></section>

      <section class="results-wrap">
        <section class="results" id="results"></section>
      </section>
    </section>
  </main>

  <script type="module">
    async function loadMainScript() {
      let version = '';
      try {
        const res = await fetch('./version.json', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          version = String(data.version || '').trim();
        }
      } catch {
        // fallback below
      }

      if (!version) version = String(Date.now());
      await import(`./assets/js/index.js?v=${encodeURIComponent(version)}`);
    }

    loadMainScript();
  </script>
</body>
</html>
